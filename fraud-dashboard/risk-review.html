document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

100%;width:{{ f.barW }};background:{{ f.barColor }};border-radius:3px;\"><\u002Fdiv>\n              <\u002Fdiv>\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:{{ f.barColor }};width:32px;text-align:right;\">{{ f.contribText }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <div style=\"display:flex;justify-content:space-between;align-items:center;padding-top:12px;font-size:11.5px;color:var(--ink-3);\">\n          <span style=\"display:inline-flex;align-items:center;gap:6px;\"><span style=\"width:9px;height:9px;border-radius:2px;background:var(--deny);\"><\u002Fspan>raises risk<\u002Fspan>\n          <span style=\"display:inline-flex;align-items:center;gap:6px;\"><span style=\"width:9px;height:9px;border-radius:2px;background:var(--approve);\"><\u002Fspan>lowers risk<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n    <\u002Fdiv>\n  <\u002Fmain>\n\n  \n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:860},&quot;radarStyle&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;area&quot;,&quot;spokes&quot;,&quot;compare&quot;],&quot;default&quot;:&quot;area&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;startDark&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;denyThreshold&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:70,&quot;min&quot;:40,&quot;max&quot;:90,&quot;step&quot;:1,&quot;tsType&quot;:&quot;number&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.state = {\n      theme: props.startDark ? 'dark' : 'light',\n      radar: props.radarStyle || 'area',\n      decision: null,\n    };\n  }\n\n  renderVals(){\n    var self = this;\n    var theme = this.state.theme;\n    var radar = this.state.radar;\n    var decision = this.state.decision;\n    var threshold = (this.props.denyThreshold != null) ? this.props.denyThreshold : 70;\n    var score = 73;\n\n    var verdict, scoreColor;\n    if (score >= threshold) { verdict = 'High risk'; scoreColor = 'var(--deny)'; }\n    else if (score >= 40) { verdict = 'Elevated — review'; scoreColor = 'var(--warn)'; }\n    else { verdict = 'Low risk'; scoreColor = 'var(--approve)'; }\n\n    var cats = [\n      {key:'Identity',   val:66, base:22, hue:42},\n      {key:'Velocity',   val:88, base:18, hue:72},\n      {key:'Geography',  val:74, base:20, hue:150},\n      {key:'Payment',    val:38, base:26, hue:24},\n      {key:'Behavioral', val:52, base:28, hue:104},\n    ];\n    var cx = 130, cy = 130, R = 92, n = cats.length;\n    function r1(x){ return Math.round(x * 10) / 10; }\n    function P(i, frac){\n      var a = -Math.PI/2 + i * 2 * Math.PI / n;\n      return [r1(cx + Math.cos(a) * R * frac), r1(cy + Math.sin(a) * R * frac)];\n    }\n    var axes = cats.map(function(c, i){\n      var a = -Math.PI/2 + i * 2 * Math.PI / n;\n      var ex = r1(cx + Math.cos(a) * R), ey = r1(cy + Math.sin(a) * R);\n      var d = P(i, c.val/100), b = P(i, c.base/100);\n      var lr = R + 20, lx = r1(cx + Math.cos(a) * lr), ly = r1(cy + Math.sin(a) * lr);\n      var cosA = Math.cos(a);\n      var anchor = Math.abs(cosA) < 0.25 ? 'middle' : (cosA > 0 ? 'start' : 'end');\n      return { key:c.key, ex:ex, ey:ey, dx:d[0], dy:d[1], bx:b[0], by:b[1],\n        lx:lx, ly:r1(ly - 4), ly2:r1(ly + 9), anchor:anchor,\n        color:'oklch(0.6 0.13 ' + c.hue + ')', valText:String(c.val) };\n    });\n    var rings = [0.25, 0.5, 0.75, 1].map(function(f){\n      return { pts: cats.map(function(c, i){ var p = P(i, f); return p[0] + ',' + p[1]; }).join(' ') };\n    });\n    var dataPoly = axes.map(function(p){ return p.dx + ',' + p.dy; }).join(' ');\n    var basePoly = axes.map(function(p){ return p.bx + ',' + p.by; }).join(' ');\n\n    var raw = [\n      {name:'Card-testing velocity',   cat:'Velocity',   detail:'10 tries / 5 min',  c:18, hue:72},\n      {name:'Billing–IP distance',     cat:'Geography',  detail:'3,210 km apart',    c:14, hue:150},\n      {name:'Unrecognized device',     cat:'Identity',   detail:'new fingerprint',   c:11, hue:42},\n      {name:'Email account age',       cat:'Identity',   detail:'4 days old',        c:9,  hue:42},\n      {name:'Ship \\u2260 billing country', cat:'Geography', detail:'NG \\u2192 US',    c:8,  hue:150},\n      {name:'High-risk card BIN',      cat:'Payment',    detail:'prepaid · NG',      c:7,  hue:24},\n      {name:'Amount vs customer norm', cat:'Behavioral', detail:'12\\u00d7 90-day avg', c:6, hue:104},\n      {name:'Datacenter / VPN IP',     cat:'Geography',  detail:'proxy detected',    c:5,  hue:150},\n      {name:'Checkout-time anomaly',   cat:'Behavioral', detail:'3:14 AM local',     c:4,  hue:104},\n      {name:'CVV verification',        cat:'Payment',    detail:'exact match',       c:-6, hue:24},\n    ];\n    var maxAbs = 18;\n    var features = raw.map(function(f, i){\n      var col = 'oklch(0.6 0.13 ' + f.hue + ')';\n      var pos = f.c > 0;\n      return {\n        rank: String(i + 1).padStart(2, '0'),\n        name: f.name, cat: f.cat, detail: f.detail,\n        color: col,\n        chipBg: 'color-mix(in oklch, ' + col + ' 18%, var(--surface))',\n        barW: Math.round(Math.abs(f.c) / maxAbs * 100) + '%',\n        barColor: pos ? 'var(--deny)' : 'var(--approve)',\n        contribText: (pos ? '+' : '\\u2212') + Math.abs(f.c),\n      };\n    });\n\n    var dmap = {\n      approve:  {title:'Transaction approved', sub:'Captured · written to audit trail', color:'var(--approve)', soft:'var(--approve-soft)'},\n      deny:     {title:'Transaction declined', sub:'Customer notified · funds released', color:'var(--deny)',   soft:'var(--deny-soft)'},\n      escalate: {title:'Escalated to review',  sub:'Assigned to a senior analyst',       color:'var(--warn)',   soft:'var(--brand-soft)'},\n    };\n    var dec = decision ? dmap[decision] : null;\n\n    function seg(active){\n      return { bg: active ? 'var(--surface)' : 'transparent',\n               fg: active ? 'var(--ink)' : 'var(--ink-3)',\n               sh: active ? '0 1px 2px rgba(0,0,0,.12)' : 'none' };\n    }\n    var radarSegs = [['area','Area'],['spokes','Spokes'],['compare','Compare']].map(function(s){\n      var a = radar === s[0]; var st = seg(a);\n      return { label:s[1], onClick:function(){ self.setState({radar:s[0]}); },\n               bg:st.bg, fg: a ? 'var(--brand)' : 'var(--ink-3)', sh:st.sh };\n    });\n    var themeSegs = [['light','Light'],['dark','Dark']].map(function(s){\n      var a = theme === s[0]; var st = seg(a);\n      return { label:s[1], onClick:function(){ self.setState({theme:s[0]}); },\n               bg:st.bg, fg:st.fg, sh:st.sh };\n    });\n\n    return {\n      theme: theme,\n      score: score, scoreColor: scoreColor, verdict: verdict,\n      scoreLeft: score + '%', threshLeft: threshold + '%', thresholdText: String(threshold),\n      recommendation: 'Model recommends manual review — velocity and geography signals exceed safe thresholds for this customer profile.',\n      axes: axes, rings: rings, dataPoly: dataPoly, basePoly: basePoly,\n      isSpokes: radar === 'spokes', isCompare: radar === 'compare',\n      showPoly: radar === 'area' || radar === 'compare', notCompare: radar !== 'compare',\n      radarSegs: radarSegs, themeSegs: themeSegs,\n      features: features,\n      approve: function(){ self.setState({decision:'approve'}); },\n      deny: function(){ self.setState({decision:'deny'}); },\n      escalate: function(){ self.setState({decision:'escalate'}); },\n      reset: function(){ self.setState({decision:null}); },\n      hasDecision: !!decision, noDecision: !decision,\n      decisionTitle: dec ? dec.title : '', decisionSub: dec ? dec.sub : '',\n      decisionColor: dec ? dec.color : 'var(--ink)', decisionSoft: dec ? dec.soft : 'var(--surface-2)',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
